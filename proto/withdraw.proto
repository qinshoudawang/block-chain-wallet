syntax = "proto3";

package withdraw;

option go_package = "proto/withdraw;withdraw";

service WithdrawService {
  rpc SubmitRBF(SubmitRBFRequest) returns (SubmitRBFResponse);
}

message SubmitRBFRequest {
  string withdraw_id = 1;
  string old_tx_hash = 2;
}

message SubmitRBFResponse {
  string withdraw_id = 1;
  string request_id = 2;
  string status = 3;
  int64 old_fee_rate_sat_per_vbyte = 4;
  int64 new_fee_rate_sat_per_vbyte = 5;
  int64 old_fee_sat = 6;
  int64 new_fee_sat = 7;
}
